<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Termy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Auth Screen -->
  <div id="auth-screen" class="screen">
    <div class="auth-box">
      <div class="banner">
        <pre>
        ╔══════════════════════════════════════╗
        ║            Termy  v2.0               ║
        ║   End-to-End Encrypted Messaging     ║
        ╚══════════════════════════════════════╝</pre>
      </div>
      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Login</button>
        <button class="tab-btn" data-tab="register">Register</button>
      </div>
      <div id="login-form" class="auth-form">
        <input id="login-user" type="text"
               placeholder="Username" autocomplete="off">
        <input id="login-pass" type="password"
               placeholder="Password">
        <button id="login-btn">Login</button>
        <div id="login-err" class="err"></div>
      </div>
      <div id="register-form" class="auth-form hidden">
        <input id="reg-user" type="text"
               placeholder="Username" autocomplete="off">
        <input id="reg-pass" type="password"
               placeholder="Password">
        <input id="reg-pass2" type="password"
               placeholder="Confirm Password">
        <button id="reg-btn">Register</button>
        <div id="reg-err" class="err"></div>
      </div>
      <div id="conn-status" class="conn-status">
        Connecting...
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app-screen" class="screen hidden">
    <div class="app-layout">

      <!-- Sidebar -->
      <div class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-header-top">
            <span class="logo-small">SecureChat</span>
            <button id="settings-btn"
                    class="settings-btn"
                    title="Settings">⚙</button>
          </div>
          <span id="my-username" class="my-user"></span>
        </div>

        <!-- Sidebar sections -->
        <div class="sidebar-section">
          <div class="section-header">
            <span>Friends</span>
            <button class="icon-btn" id="add-friend-btn"
                    title="Add friend">+</button>
          </div>
          <div id="friend-list" class="list"></div>
        </div>

        <div class="sidebar-section">
          <div class="section-header">
            <span>Groups</span>
            <button class="icon-btn" id="create-group-btn"
                    title="Create group">+</button>
          </div>
          <div id="group-list" class="list"></div>
        </div>

        <div class="sidebar-section">
          <div class="section-header">
            <span>Voice Chats</span>
            <button class="icon-btn" id="create-vchat-btn"
                    title="Create voice chat">+</button>
          </div>
          <div id="vchat-list" class="list"></div>
        </div>

        <div class="sidebar-footer">
          <div id="voice-status"
               class="voice-status hidden">
            <span id="voice-status-name"></span>
            <div id="vu-meters" class="vu-meters"></div>
            <div class="voice-controls">
              <button id="mute-btn" class="vc-btn"
                      title="Mute">MIC</button>
              <button id="deaf-btn" class="vc-btn"
                      title="Deafen">DEAF</button>
              <button id="hk-btn" class="vc-btn"
                      title="Headset kill">HK</button>
              <button id="leave-vc-btn"
                      class="vc-btn danger"
                      title="Leave">LEAVE</button>
            </div>
          </div>
        </div>
      </div>

    <!-- Tiling chat area -->
      <div class="chat-area" id="chat-area">
        <div id="welcome-screen" class="welcome">
          <div class="welcome-text">
            <pre>
 Select a conversation to open it</pre>
          </div>
        </div>
        <!-- Panels injected here by tiler.js -->
        <div id="tile-root" class="tile-root"></div>
      </div>

        <!-- Chat window -->
        <div id="chat-window" class="chat-window hidden">
          <div class="chat-header">
            <div class="chat-header-info">
              <span id="chat-title"></span>
              <span id="chat-subtitle"
                    class="subtitle"></span>
            </div>
            <div class="chat-header-actions">
              <button id="members-btn"
                      class="icon-btn hidden"
                      title="Members">Members</button>
              <button id="invite-btn"
                      class="icon-btn hidden"
                      title="Invite">Invite</button>
              <button id="kick-btn"
                      class="icon-btn hidden"
                      title="Kick">Kick</button>
              <button id="leave-group-btn"
                      class="icon-btn hidden danger"
                      title="Leave">Leave</button>
            </div>
          </div>
          <div id="messages" class="messages"></div>

          <!-- File offers appear here, above input -->
          <div id="chat-file-offers"
               class="chat-file-offers"></div>

          <div class="input-area">
            <input id="msg-input" type="text"
                   placeholder="Message..."
                   autocomplete="off">
            <button id="send-file-btn"
                    class="input-file-btn"
                    title="Send file">📎</button>
            <button id="send-btn">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modals -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal" class="modal">
      <div class="modal-header">
        <span id="modal-title"></span>
        <button id="modal-close">x</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settings-overlay"
       class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span>Settings</span>
        <button class="icon-btn" id="settings-close">x</button>
      </div>
      <div class="modal-body">
        <div class="settings-section">
          <div class="settings-label">Account</div>
          <button id="logout-btn"
                  class="settings-logout-btn">
            Logout
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Generic modal -->
  <div id="modal-overlay"
       class="modal-overlay hidden">
    <div id="modal" class="modal">
      <div class="modal-header">
        <span id="modal-title"></span>
        <button id="modal-close">x</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <input id="file-input" type="file"
         style="display:none">

  <input id="file-input" type="file" style="display:none">

  <script type="module" src="crypto.js"></script>
  <script type="module" src="filetransfer.js"></script>
  <script type="module" src="voice.js"></script>
  <script type="module" src="ui.js"></script>
  <script type="module" src="app.js"></script>
  <script type="module" src="tiler.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
